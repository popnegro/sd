<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Experience | UI Senior Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #fff;
            overflow-x: hidden;
        }

        .panorama-viewport {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .panorama-track {
            display: flex;
            height: 100%;
            width: fit-content;
            will-change: transform;
        }

        .panorama-img {
            height: 100vh;
            width: auto; /* Mantiene la proporción panorámica */
            max-width: none;
            object-fit: cover;
        }

        .content-overlay {
            position: absolute;
            left: 10%;
            z-index: 20;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        /* Indicador de carga y progreso */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: #fff;
            z-index: 100;
        }

        .scroll-hint {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.5;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div class="progress-bar"></div>
    <div class="scroll-hint">Scroll para explorar</div>

    <main id="main-container">
        
        <section class="panorama-viewport" id="section1">
            <div class="content-overlay">
                <span class="text-xs uppercase tracking-widest opacity-60">Proyecto 01</span>
                <h1 class="text-6xl md:text-8xl font-black uppercase leading-none mt-2">Urbano<br>Industrial</h1>
            </div>
            <div class="panorama-track">
                <img src="1.png" class="panorama-img" alt="Panorama 1">
            </div>
        </section>

        <section class="h-screen flex items-center justify-center bg-white text-black p-10">
            <div class="max-w-4xl">
                <h2 class="text-4xl font-light italic">"El diseño no es lo que ves, sino cómo haces que otros vean el mundo."</h2>
            </div>
        </section>

        <section class="panorama-viewport" id="section2">
            <div class="content-overlay">
                <span class="text-xs uppercase tracking-widest opacity-60">Proyecto 02</span>
                <h1 class="text-6xl md:text-8xl font-black uppercase leading-none mt-2">Naturaleza<br>Extrema</h1>
            </div>
            <div class="panorama-track">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=4000&auto=format&fit=crop" class="panorama-img" alt="Panorama 2">
            </div>
        </section>

    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Animación de la barra de progreso superior
        gsap.to(".progress-bar", {
            width: "100%",
            ease: "none",
            scrollTrigger: { scrub: 0.3 }
        });

        // Lógica para cada sección panorámica
        const viewports = document.querySelectorAll(".panorama-viewport");

        viewports.forEach((viewport) => {
            const track = viewport.querySelector(".panorama-track");
            
            // Calculamos cuánto debe desplazarse la imagen hacia la izquierda
            // Es la diferencia entre el ancho total de la imagen y el ancho de la pantalla
            const getScrollAmount = () => -(track.scrollWidth - window.innerWidth);

            gsap.to(track, {
                x: getScrollAmount,
                ease: "none",
                scrollTrigger: {
                    trigger: viewport,
                    start: "top top",
                    end: () => `+=${track.scrollWidth}`, // La duración del scroll depende del ancho de la imagen
                    pin: true,
                    scrub: 1, // Suavizado de 1 segundo para sensación de inercia
                    invalidateOnRefresh: true, // Recalcula si se cambia el tamaño de ventana
                }
            });

            // Animación del texto (Parallax sutil)
            gsap.from(viewport.querySelector(".content-overlay"), {
                y: 50,
                opacity: 0,
                duration: 1,
                scrollTrigger: {
                    trigger: viewport,
                    start: "top 80%",
                    toggleActions: "play reverse play reverse"
                }
            });
        });
    </script>
</body>
</html>
