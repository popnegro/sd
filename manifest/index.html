<script>
let active = null;
let start = 0;

// TRACK
document.querySelectorAll('.wn-photo').forEach(el => {

    // DESKTOP
    el.addEventListener('mouseenter', () => {
        active = el;
        start = Date.now();
    });

    el.addEventListener('mouseleave', () => trackTime(el));

    // MOBILE
    el.addEventListener('touchstart', () => {
        active = el;
        start = Date.now();
    });

    el.addEventListener('touchend', () => trackTime(el));

});

function trackTime(el) {
    if (!active) return;

    let time = Math.floor((Date.now() - start) / 1000);

    let label = "curioso";
    if (time > 3) label = "interesado";
    if (time > 6) label = "enganchado";

    el.querySelector('.wn-time').innerText = time + "s";
    el.querySelector('.wn-label').innerText = label;

    saveWN(el.dataset.id, time);

    // GA4 EVENTO
    if (typeof gtag !== "undefined") {
        gtag('event', 'photo_interaction', {
            event_category: 'UX',
            event_label: el.dataset.id,
            value: time
        });
    }

    active = null;
}

// STORAGE
function saveWN(id, time) {
    let data = JSON.parse(localStorage.getItem('wn-data') || "{}");

    if (!data[id]) {
        data[id] = { views: 0, total: 0 };
    }

    data[id].views++;
    data[id].total += time;

    localStorage.setItem('wn-data', JSON.stringify(data));
}

// DATA MODE
let btn = document.getElementById("wnDataToggle");
let dataMode = false;

btn.onclick = () => {
    document.body.classList.toggle("data-mode");
    renderData();
    updateNarrative(); 
};

// RENDER
function renderData() {
    let data = JSON.parse(localStorage.getItem('wn-data') || "{}");

    document.querySelectorAll('.wn-photo').forEach(el => {
        let id = el.dataset.id;
        if (!data[id]) return;

        let avg = Math.round(data[id].total / data[id].views);

        el.querySelector('.wn-time').innerText = avg + "s";

        el.classList.remove("wn-hot-high","wn-hot-mid","wn-hot-low");

        if (avg > 5) el.classList.add("wn-hot-high");
        else if (avg > 3) el.classList.add("wn-hot-mid");
        else el.classList.add("wn-hot-low");
    });
}

// INIT
window.addEventListener("load", renderData);

const revealElements = document.querySelectorAll('.wn-reveal');

const revealObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
        }
    });
}, {
    threshold: 0.2
});

revealElements.forEach(el => revealObserver.observe(el));
function updateNarrative() {

    let data = JSON.parse(localStorage.getItem('wn-data') || "{}");

    let totalViews = 0;
    let totalTime = 0;

    Object.values(data).forEach(d => {
        totalViews += d.views;
        totalTime += d.total;
    });

    if (totalViews === 0) return;

    let avg = totalTime / totalViews;

    let text = "";

    if (avg < 2) {
        text = "Recorrés rápido. Buscás algo que todavía no aparece.";
    } else if (avg < 4) {
        text = "Observás, pero decidís rápido. Filtrás sin detenerte demasiado.";
    } else if (avg < 7) {
        text = "Hay interés. Algunas imágenes logran retenerte.";
    } else {
        text = "Te detenés. Mirás con intención. No solo consumís, interpretás.";
    }

    document.getElementById("wnDynamicText").innerText = text;
}
window.addEventListener("load", () => {
    renderData();
    updateNarrative();
});
</script>
