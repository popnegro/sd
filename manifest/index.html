<!DOCTYPE html>
<html lang="es">

<head>
    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-79PJLWVL74"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag("js", new Date());
        gtag("config", "G-79PJLWVL74");
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHISPERING NOISE | DATA EXPERIENCE</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background:#000; color:#fff; margin:0; font-family:Arial; }

        .gallery {
            display:grid;
            grid-template-columns:1fr;
        }

        @media(min-width:768px){
            .gallery { grid-template-columns:repeat(2,1fr); }
        }

        .batch {
            opacity:0;
            transform:translateY(60px);
            transition:1s ease;
        }

        .batch.visible {
            opacity:1;
            transform:translateY(0);
        }

        .wn-photo { position:relative; }
        .wn-photo img { width:100%; display:block; }

        .wn-overlay {
            position:absolute;
            bottom:0;
            width:100%;
            padding:8px;
            font-size:12px;
            background:rgba(0,0,0,0.6);
            display:flex;
            justify-content:space-between;
            opacity:0;
        }

        .wn-photo:hover .wn-overlay { opacity:1; }
        body.data-mode .wn-overlay { opacity:1 !important; }

        .wn-hot-high{outline:3px solid red;}
        .wn-hot-mid{outline:2px solid orange;}
        .wn-hot-low{opacity:0.7;}

        #wnDataToggle{
            position:fixed;
            top:20px; right:20px;
            z-index:999;
            background:#111;
            padding:8px 12px;
            border:1px solid #444;
        }

        .wn-concept {
            min-height:60vh;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:40px;
        }

        .wn-concept p {
            max-width:600px;
            opacity:0;
            transform:translateY(30px);
            transition:0.8s;
        }

        .wn-concept p.visible {
            opacity:1;
            transform:translateY(0);
        }
    </style>
</head>

<body>

<button id="wnDataToggle">DATA MODE</button>

<div id="app"></div>

<script>
// ---------------- CONFIG ----------------
const TOTAL = 30;
const BATCH = 6;

// ---------------- GENERAR HTML ----------------
const app = document.getElementById("app");

for (let i = 1; i <= TOTAL; i++) {

    if ((i - 1) % BATCH === 0) {
        const gallery = document.createElement("div");
        gallery.className = "gallery batch";
        app.appendChild(gallery);
    }

    const currentGallery = app.lastElementChild;

    const id = String(i).padStart(2, '0');

    const photo = document.createElement("div");
    photo.className = "wn-photo";
    photo.dataset.id = `img_${id}`;

    photo.innerHTML = `
        <img src="/manifest/${id}.webp" loading="lazy">
        <div class="wn-overlay">
            <span class="wn-time">0s</span>
            <span class="wn-label">—</span>
        </div>
    `;

    currentGallery.appendChild(photo);

    if (i % BATCH === 0) {
        const section = document.createElement("section");
        section.className = "wn-concept";
        section.innerHTML = `
            <p class="wn-reveal dynamic-text">
                Analizando tu forma de mirar...
            </p>
        `;
        app.appendChild(section);
    }
}

// ---------------- TRACKING ----------------
document.querySelectorAll('.wn-photo').forEach(el => {

    let start = 0;

    const startTracking = () => start = Date.now();

    const endTracking = () => {
        if (!start) return;

        let time = Math.floor((Date.now() - start)/1000);
        start = 0;

        if (time < 1) return;

        let label = "curioso";
        if (time > 3) label = "interesado";
        if (time > 6) label = "enganchado";

        el.querySelector('.wn-time').innerText = time + "s";
        el.querySelector('.wn-label').innerText = label;

        saveWN(el.dataset.id, time);

        if (typeof gtag !== "undefined") {
            gtag('event','photo_interaction',{
                photo_id: el.dataset.id,
                engagement_time: time
            });
        }
    };

    el.addEventListener('mouseenter', startTracking);
    el.addEventListener('mouseleave', endTracking);
    el.addEventListener('touchstart', startTracking);
    el.addEventListener('touchend', endTracking);

    new IntersectionObserver(entries=>{
        entries.forEach(e=>{
            if(!e.isIntersecting) endTracking();
        });
    },{threshold:0.3}).observe(el);
});

// ---------------- STORAGE ----------------
function saveWN(id,time){
    let data = JSON.parse(localStorage.getItem('wn-data')||"{}");

    if(!data[id]) data[id]={views:0,total:0};

    data[id].views++;
    data[id].total+=time;

    localStorage.setItem('wn-data',JSON.stringify(data));
}

// ---------------- DATA MODE ----------------
document.getElementById("wnDataToggle").onclick=()=>{
    document.body.classList.toggle("data-mode");
    renderData();
    updateNarrative();
};

// ---------------- RENDER ----------------
function renderData(){
    let data = JSON.parse(localStorage.getItem('wn-data')||"{}");

    document.querySelectorAll('.wn-photo').forEach(el=>{
        let d = data[el.dataset.id];
        if(!d) return;

        let avg = Math.round(d.total/d.views);

        el.querySelector('.wn-time').innerText = avg+"s";

        el.classList.remove("wn-hot-high","wn-hot-mid","wn-hot-low");

        if(avg>5) el.classList.add("wn-hot-high");
        else if(avg>3) el.classList.add("wn-hot-mid");
        else el.classList.add("wn-hot-low");
    });
}

// ---------------- NARRATIVA ----------------
function updateNarrative(){
    let data = JSON.parse(localStorage.getItem('wn-data')||"{}");

    let totalViews=0,totalTime=0;

    Object.values(data).forEach(d=>{
        totalViews+=d.views;
        totalTime+=d.total;
    });

    if(totalViews===0) return;

    let avg = totalTime/totalViews;

    let text =
        avg<2 ? "Recorrés rápido. Buscás algo que todavía no aparece." :
        avg<4 ? "Observás, pero decidís rápido." :
        avg<7 ? "Hay interés. Algunas imágenes te retienen." :
        "Te detenés. Mirás con intención.";

    document.querySelectorAll('.dynamic-text').forEach(el=>{
        el.innerText = text;
    });
}

// ---------------- REVEAL ----------------
const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("visible");
    });
},{threshold:0.2});

document.querySelectorAll('.batch').forEach(el=>observer.observe(el));
document.querySelectorAll('.wn-reveal').forEach(el=>observer.observe(el));

// INIT
window.onload=()=>{
    renderData();
    updateNarrative();
};
</script>

</body>
</html>
