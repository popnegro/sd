<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHISPERING NOISE | HEATMAP EVOLUTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-red: #ff0000; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #app { padding: 40px 5% 150px 5%; max-width: 1100px; margin: 0 auto; min-height: 100vh; }

        /* --- CURSORES REMOTOS --- */
        .remote-cursor {
            position: fixed; width: 12px; height: 12px;
            border: 1px solid var(--accent-red); border-radius: 50%;
            pointer-events: none; z-index: 5000; transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: none;
        }
        .remote-cursor::after { content: attr(data-label); position: absolute; top: -15px; left: 15px; font-family: monospace; font-size: 7px; color: var(--accent-red); }
        body.data-mode .remote-cursor { display: block; }

        /* --- FOTO Y CANVAS DE CALOR --- */
        .wn-photo { position: relative; background: #0a0a0a; aspect-ratio: 1 / 1; overflow: hidden; width: 100%; cursor: crosshair; }
        .wn-photo.marked { outline: 2px solid var(--accent-red); outline-offset: -2px; }
        
        .heatmap-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.5s;
            mix-blend-mode: screen;
        }
        body.data-mode .heatmap-canvas { opacity: 1; }

        .mark-indicator { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 8px; background: var(--accent-red); color: #000; padding: 2px 5px; opacity: 0; z-index: 30; }
        .wn-photo.marked .mark-indicator { opacity: 1; }
        .wn-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.5s ease; }
        .wn-photo img.loaded { opacity: 1; }

        /* --- UI --- */
        .ui-controls { position: fixed; top: 25px; right: 25px; z-index: 6000; display: flex; gap: 10px; }
        .btn-ui { background: rgba(15, 15, 15, 0.85); border: 1px solid #333; color: #fff; padding: 10px 16px; font-size: 9px; text-transform: uppercase; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; transition: 0.3s; }
        .btn-ui:hover { background: #fff; color: #000; }
        
        #identity-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 7000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .card-id { border: 1px solid #333; padding: 40px; max-width: 400px; font-family: monospace; border-top: 4px solid var(--accent-red); background: #0a0a0a; }

        .wn-footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 1500; background: rgba(5, 5, 5, 0.95); border-top: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #scroll-progress { position: absolute; top: 0; left: 0; height: 1px; background: var(--accent-red); width: 0%; transition: width 0.1s; }
        #status-log { font-family: monospace; font-size: 10px; color: #666; text-transform: uppercase; text-align: center; max-width: 80%; }
    </style>
</head>
<body>

    <div class="ui-controls">
        <button id="btnIdentity" class="btn-ui" style="display:none">Reporte Final</button>
        <button id="wnDataToggle" class="btn-ui">Análisis</button>
    </div>

    <div id="identity-modal">
        <div class="card-id">
            <h2 style="color:var(--accent-red); margin-bottom: 20px;">DIAGNÓSTICO_FINAL</h2>
            <div id="id-content" style="font-size: 12px; line-height: 1.6; color: #aaa; margin-bottom: 30px;"></div>
            <button id="shareWhatsapp" class="btn-ui" style="background:#25D366; color:black; width:100%; justify-content:center; border:none; margin-bottom:10px;">WhatsApp</button>
            <button onclick="document.getElementById('identity-modal').style.display='none'" class="btn-ui" style="width: 100%; justify-content: center;">Cerrar</button>
        </div>
    </div>

    <div id="app"></div>

    <footer class="wn-footer">
        <div id="scroll-progress"></div>
        <p id="status-log">SISTEMA_INICIALIZADO...</p>
        <div id="node-counter" style="font-family: monospace; font-size: 9px; color: var(--accent-red); margin-top:5px;">NODOS_ACTIVOS: <span id="node-val">07</span></div>
    </footer>

    <script>
        const CONFIG = { TOTAL_IMAGES: 28, BATCH_SIZE: 4, IMG_PATH: 'manifest/' };
        const FRASES = {
            scroll: ["Navegar no es observar.", "La velocidad es la enemiga de la huella.", "¿Cuántas imágenes has ignorado?"],
            interaccion: ["Te has detenido. El tiempo existe ahora.", "¿Por qué este fragmento?", "Dejando huella térmica..."],
            sistema: ["Sincronizando pulso visual...", "Rastreando otros observadores..."]
        };

        const ghosts = [];
        function createGhosts() {
            for (let i = 0; i < 5; i++) {
                const el = document.createElement('div');
                el.className = 'remote-cursor';
                el.setAttribute('data-label', `NODE_0${Math.floor(Math.random()*99)}`);
                document.body.appendChild(el);
                ghosts.push({ el, x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, tx: Math.random()*window.innerWidth, ty: Math.random()*window.innerHeight, speed: 0.03 });
            }
        }

        function animateGhosts() {
            ghosts.forEach(g => {
                g.x += (g.tx - g.x) * g.speed; g.y += (g.ty - g.y) * g.speed;
                g.el.style.transform = `translate(${g.x}px, ${g.y}px)`;
                if (Math.abs(g.tx - g.x) < 10) { g.tx = Math.random()*window.innerWidth; g.ty = Math.random()*window.innerHeight; }
            });
            requestAnimationFrame(animateGhosts);
        }

        // --- LÓGICA DEL MAPA DE CALOR ACUMULATIVO ---
        function paintHeat(canvas, xPercent, yPercent) {
            const ctx = canvas.getContext('2d');
            const x = (xPercent * canvas.width) / 100;
            const y = (yPercent * canvas.height) / 100;
            
            // Estilo de mancha agigantada
            const radius = 60; 
            const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
            grad.addColorStop(0, 'rgba(255, 0, 0, 0.4)');
            grad.addColorStop(1, 'rgba(255, 0, 0, 0)');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function handleInteraction(e, box) {
            const canvas = box.querySelector('.heatmap-canvas');
            const rect = box.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
            const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);

            // Guardar datos
            let db = JSON.parse(localStorage.getItem('wn-heat') || "{}");
            if(!db[box.dataset.id]) db[box.dataset.id] = [];
            db[box.dataset.id].push({x, y});
            localStorage.setItem('wn-heat', JSON.stringify(db));
            
            paintHeat(canvas, x, y);
            document.getElementById('status-log').innerText = FRASES.interaccion[Math.floor(Math.random()*FRASES.interaccion.length)];
        }

        function init() {
            createGhosts(); animateGhosts();
            const marks = JSON.parse(localStorage.getItem('wn-marks') || "[]");
            const heatData = JSON.parse(localStorage.getItem('wn-heat') || "{}");

            for (let i = 1; i <= CONFIG.TOTAL_IMAGES; i++) {
                if ((i-1) % CONFIG.BATCH_SIZE === 0) {
                    const g = document.createElement("div"); g.className = "gallery grid grid-cols-1 md:grid-cols-2 gap-10 mb-10 opacity-0 transform translate-y-10 transition-all duration-1000";
                    app.appendChild(g);
                }
                const id = `img_${String(i).padStart(2, '0')}`;
                const box = document.createElement("div");
                box.className = `wn-photo ${marks.includes(id) ? 'marked' : ''}`;
                box.dataset.id = id;
                box.onclick = (e) => handleInteraction(e, box);
                box.ondblclick = () => {
                    box.classList.toggle('marked');
                    let m = JSON.parse(localStorage.getItem('wn-marks') || "[]");
                    m.includes(id) ? m = m.filter(x => x !== id) : m.push(id);
                    localStorage.setItem('wn-marks', JSON.stringify(m));
                };

                const canvas = document.createElement('canvas');
                canvas.className = 'heatmap-canvas';
                canvas.width = 500; canvas.height = 500; // Resolución interna
                
                const img = new Image(); img.src = `${CONFIG.IMG_PATH}${id.split('_')[1]}.webp`;
                img.onload = () => img.classList.add('loaded');

                box.innerHTML = `<div class="mark-indicator">MARKED</div>`;
                box.prepend(canvas);
                box.prepend(img);
                app.lastElementChild.appendChild(box);

                // Renderizar calor previo
                if(heatData[id]) heatData[id].forEach(pt => paintHeat(canvas, pt.x, pt.y));
            }

            const obs = new IntersectionObserver((ents) => {
                ents.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.classList.remove("opacity-0", "translate-y-10");
                        if(e.target.dataset.id) e.target.dataset.start = Date.now();
                    }
                });
            }, {threshold: 0.1});
            document.querySelectorAll('.gallery, .wn-photo').forEach(el => obs.observe(el));
        }

        document.getElementById("wnDataToggle").onclick = function() {
            document.body.classList.toggle("data-mode");
            this.innerText = document.body.classList.contains("data-mode") ? "Obra" : "Análisis";
        };

        window.onload = init;
    </script>
</body>
</html>
