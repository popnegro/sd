<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SIGNAL | MORPHEUS RGB ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* BASE & RESET */
        body, html { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        :root { 
            --kick: 0; 
            --morpheus-intensity: 50px; 
        }

        /* ENGINE CONTAINER: Mantiene las proporciones */
        .viewport-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ASPECT RATIO CONTROL */
        .crt-container {
            position: relative;
            background: #050505;
            transition: transform 0.1s ease-out;
            transform: scale(calc(1 + var(--kick) * 0.05));
            will-change: transform;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Desktop: 16:9 */
        @media (min-width: 769px) {
            .crt-container {
                width: 100vw;
                height: 56.25vw; /* 9/16 = 0.5625 */
                max-height: 100vh;
                max-width: 177.78vh; /* 16/9 = 1.7778 */
            }
        }

        /* Mobile: 9:16 */
        @media (max-width: 768px) {
            .crt-container {
                width: 100vw;
                height: 100vh;
                /* Si prefieres un recuadro 9:16 exacto en lugar de full screen: */
                /* width: 56.25vh; height: 100vh; max-width: 100vw; */
            }
        }

        /* MORPHEUS RGB LAYERS */
        .glitch-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            mix-blend-mode: screen;
            pointer-events: none;
            will-change: transform;
        }

        .layer-red {
            background-color: #f00;
            background-blend-mode: multiply;
            transform: translate3d(calc(var(--kick) * var(--morpheus-intensity) * -1.5), 0, 0);
        }

        .layer-green {
            background-color: #0f0;
            background-blend-mode: multiply;
            transform: translate3d(0, calc(var(--kick) * 10px), 0);
            opacity: 0.8;
        }

        .layer-blue {
            background-color: #00f;
            background-blend-mode: multiply;
            transform: translate3d(calc(var(--kick) * var(--morpheus-intensity) * 1.5), 0, 0);
        }

        /* IMAGEN BASE & SLIDES */
        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: grayscale(1) contrast(1.2);
        }

        /* EFECTOS DE PANTALLA (SCANLINES) */
        .scanlines::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.4) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        /* UI ELEMENTS */
        .ui-overlay {
            position: absolute;
            z-index: 50;
            bottom: 10%;
            left: 5%;
            pointer-events: none;
        }

        .main-title {
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            line-height: 0.8;
            text-shadow: calc(var(--kick) * 10px) 0 0 rgba(255,0,0,0.5);
        }

        #start-engine {
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        .loading-bar-container {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            overflow: hidden;
        }

        #loading-bar {
            height: 100%;
            background: #ff0000;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body>

    <audio id="bg-track" src="assets/sounds/mixkit-space-soundscape-653.mp3" loop crossorigin="anonymous"></audio>
 
    <div class="viewport-wrapper">
        
        <div class="ui-overlay">
            <div id="header-group">
                <button id="start-engine" class="px-8 py-4 border border-white/30 text-white text-[10px] tracking-[0.5em] uppercase hover:bg-white hover:text-black transition-all duration-500">
                    Execute Sequence
                </button>
            </div>
            
            <div class="mt-12">
                <h1 class="main-title text-[12vw] md:text-[8vw]">
                    SOUND<span class="text-white/80">OF</span><br>CHANGES
                </h1>
                <div class="loading-bar-container">
                    <div id="loading-bar"></div>
                </div>
                <p class="text-[9px] text-white/40 tracking-[0.3em] mt-2 uppercase">Sync: Morpheus_RGB_v2.0</p>
            </div>
        </div>

        <figure class="crt-container scanlines">
            <div id="carousel" class="absolute inset-0 w-full h-full opacity-20">
                <img src="assets/img/eyes.webp" class="slide opacity-100" alt="1">
                <img src="assets/img/denial/1.webp" class="slide opacity-0" alt="2">
                <img src="assets/img/acceptance/02.png" class="slide opacity-0" alt="3">
                <img src="assets/img/anger/1.png" class="slide opacity-0" alt="4">
            </div>

            <div id="layer-r" class="glitch-layer layer-red"></div>
            <div id="layer-g" class="glitch-layer layer-green"></div>
            <div id="layer-b" class="glitch-layer layer-blue"></div>

            <div class="absolute inset-0 bg-[radial-gradient(circle,transparent_40%,black_120%)] z-20 pointer-events-none"></div>
        </figure>

    </div>

    <script>
        (function() {
            // Configuración
            const CONFIG = {
                threshold: 215,     // Sensibilidad al bajo (0-255)
                rotationWait: 500,  // Tiempo mínimo entre cambios de imagen (ms)
                intensityMult: 1.2  // Multiplicador de fuerza del glitch
            };

            const state = {
                isRunning: false,
                currentIndex: 0,
                lastRotation: 0
            };

            const dom = {
                btn: document.getElementById('start-engine'),
                audio: document.getElementById('bg-track'),
                slides: document.querySelectorAll('.slide'),
                layers: [
                    document.getElementById('layer-r'),
                    document.getElementById('layer-g'),
                    document.getElementById('layer-b')
                ],
                root: document.documentElement,
                bar: document.getElementById('loading-bar'),
                header: document.getElementById('header-group')
            };

            let audioCtx, analyser, dataArray;

            function updateLayerImages() {
                const currentImg = dom.slides[state.currentIndex].src;
                dom.layers.forEach(layer => {
                    layer.style.backgroundImage = `url('${currentImg}')`;
                });
            }

            function rotateContent() {
                const now = Date.now();
                if (now - state.lastRotation < CONFIG.rotationWait) return;

                dom.slides[state.currentIndex].classList.replace('opacity-100', 'opacity-0');
                state.currentIndex = (state.currentIndex + 1) % dom.slides.length;
                dom.slides[state.currentIndex].classList.replace('opacity-0', 'opacity-100');
                
                updateLayerImages();
                state.lastRotation = now;
            }

            function engineLoop() {
                if (!state.isRunning) return;
                requestAnimationFrame(engineLoop);

                analyser.getByteFrequencyData(dataArray);

                // Capturamos el impacto de los bajos (frecuencias 2 a 5)
                const bassValue = dataArray[2]; 
                const intensity = Math.pow(bassValue / 255, 1.6) * CONFIG.intensityMult;

                // Actualizamos variables CSS en tiempo real
                dom.root.style.setProperty('--kick', intensity.toFixed(4));
                dom.bar.style.width = `${(bassValue / 255) * 100}%`;

                // Disparador de cambio de imagen
                if (bassValue > CONFIG.threshold) {
                    rotateContent();
                }
            }

            async function start() {
                if (state.isRunning) return;

                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 64; 
                    
                    const source = audioCtx.createMediaElementSource(dom.audio);
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);

                    dataArray = new Uint8Array(analyser.frequencyBinCount);

                    await dom.audio.play();
                    state.isRunning = true;
                    
                    dom.header.style.opacity = '0';
                    setTimeout(() => dom.header.style.display = 'none', 500);

                    updateLayerImages();
                    engineLoop();
                } catch (e) {
                    console.error("Error iniciando el motor:", e);
                }
            }

            dom.btn.addEventListener('click', () => {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                start();
            });
        })();
    </script>
</body>
</html>
