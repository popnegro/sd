<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Grasso | Visual Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #ebff00;
            --gray: #151515;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.2;
        }

        /* --- Microinteracción: Cursor Experimental --- */
        #cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: difference;
            transition: width 0.3s var(--ease), height 0.3s var(--ease), background 0.3s var(--ease);
        }

        /* --- Header Metropolitan --- */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 5% 8%;
        }

        .main-title {
            font-size: clamp(3rem, 15vw, 10rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.85;
        }

        /* --- Grid de Proyectos --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
            padding: 10vh 8%;
        }

        .project-item {
            grid-column: span 12;
            margin-bottom: 15vh;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        @media (min-width: 768px) {
            .project-item { grid-column: span 6; }
            .project-item:nth-child(even) { margin-top: 20vh; }
        }

        /* --- Efecto de Revelado (Clip-path) --- */
        .media-container {
            position: relative;
            width: 100%;
            background: var(--gray);
            overflow: hidden;
            clip-path: inset(100% 0 0 0);
            transition: clip-path 1.4s var(--ease);
        }

        .media-container.visible {
            clip-path: inset(0% 0 0 0);
        }

        .media-container img {
            width: 100%;
            height: 110%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.7);
            transform: scale(1.3);
            transition: transform 2s var(--ease), filter 1.2s ease;
        }

        .project-item:hover img {
            transform: scale(1.1);
            filter: grayscale(0) brightness(1);
        }

        /* --- Tipografía y Meta --- */
        .project-meta {
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.4;
        }

        .project-title {
            margin-top: 0.5rem;
            font-size: 1.5rem;
            font-weight: 400;
        }

        footer {
            padding: 5% 8%;
            border-top: 1px solid var(--gray);
            font-size: 0.8rem;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <header>
        <h1 class="main-title">SELECTED<br>WORKS_</h1>
    </header>

    <main id="gallery-root" class="gallery">
        </main>

    <footer>
        <p>© 2026 Luis Grasso — Mendoza, Argentina.</p>
    </footer>

    <script>
        /**
         * LUIS GRASSO | PORTFOLIO ENGINE UNIFICADO
         * Estética: Dark Tech / Metropolitan
         */

        const CONFIG = {
            dataSource: '/feed.jsons', // Asegúrate de que esta ruta sea correcta
            lerpAmount: 0.1
        };

        // 1. Carga de Datos y Renderizado
        async function init() {
            const root = document.getElementById('gallery-root');
            
            try {
                const response = await fetch(CONFIG.dataSource);
                const data = await response.json();
                
                if (data && data.posts) {
                    render(data.posts);
                } else if (Array.isArray(data)) {
                    render(data);
                }
            } catch (err) {
                console.error("Fallo al cargar el archivo JSON:", err);
                root.innerHTML = `<p style="grid-column: span 12; opacity: 0.5; text-transform: uppercase; font-size: 10px;">Error de sincronización con el archivo de datos.</p>`;
            }
        }

        function render(items) {
            const root = document.getElementById('gallery-root');
            root.innerHTML = ''; // Limpiar contenedor
            
            items.forEach((item, index) => {
                const article = document.createElement('a');
                article.href = item.url || "#";
                article.target = "_blank";
                article.className = 'project-item';
                
                // Formateo de número (01, 02...)
                const count = (index + 1).toString().padStart(2, '0');
                
                article.innerHTML = `
                    <div class="media-container" style="aspect-ratio: ${item.aspect || '4/5'}">
                        <img src="${item.image || item.url}" alt="${item.title || item.caption}" loading="lazy">
                    </div>
                    <div class="project-meta">
                        <span>${item.location || 'Argentina'}</span>
                        <span>${count} // ${item.date || '2026'}</span>
                    </div>
                    <h2 class="project-title">${item.title || item.caption}</h2>
                `;
                root.appendChild(article);
            });

            setupObservers();
        }

        // 2. Custom Cursor (LERP)
        const cursor = document.getElementById('cursor');
        let mouse = { x: 0, y: 0 };
        let pos = { x: 0, y: 0 };

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animateCursor() {
            pos.x += (mouse.x - pos.x) * CONFIG.lerpAmount;
            pos.y += (mouse.y - pos.y) * CONFIG.lerpAmount;
            cursor.style.left = `${pos.x}px`;
            cursor.style.top = `${pos.y}px`;
            cursor.style.transform = `translate(-50%, -50%)`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // 3. Reveal al Scroll (Intersection Observer)
        function setupObservers() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.media-container').forEach(el => observer.observe(el));
        }

        // 4. Interacciones del Cursor
        document.addEventListener('mouseover', e => {
            if (e.target.closest('.project-item')) {
                cursor.style.width = '60px';
                cursor.style.height = '60px';
                cursor.style.backgroundColor = 'transparent';
                cursor.style.border = '1px solid var(--accent)';
            }
        });

        document.addEventListener('mouseout', e => {
            if (e.target.closest('.project-item')) {
                cursor.style.width = '10px';
                cursor.style.height = '10px';
                cursor.style.backgroundColor = 'var(--accent)';
                cursor.style.border = 'none';
            }
        });

        // Inicio
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
