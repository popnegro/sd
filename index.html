<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHISPERING NOISE | DATA EXPERIENCE</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-79PJLWVL74"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag("js", new Date());
        gtag("config", "G-79PJLWVL74");
    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --accent-red: #ff0000;
            --accent-orange: #ff8800;
        }

        body { 
            background: #000; 
            color: #fff; 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* Layout Galería */
        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
        }

        @media(min-width: 768px) {
            .gallery { grid-template-columns: repeat(2, 1fr); }
        }

        .wn-photo { 
            position: relative; 
            background: #0a0a0a; 
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .wn-photo img { 
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .wn-photo:hover img { transform: scale(1.05); }

        /* Overlay Individual */
        .wn-overlay {
            position: absolute;
            bottom: 0; width: 100%; padding: 10px;
            font-size: 10px; font-family: monospace;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex; justify-content: space-between;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }

        .wn-photo:hover .wn-overlay, body.data-mode .wn-overlay { opacity: 1; }

        /* Data Mode Clases */
        body.data-mode .wn-hot-high { outline: 4px solid var(--accent-red); outline-offset: -4px; }
        body.data-mode .wn-hot-mid { outline: 3px solid var(--accent-orange); outline-offset: -3px; }
        body.data-mode .wn-hot-low { opacity: 0.4; }

        /* Footer Fijo Narrativo */
        .wn-concept {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 70px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            border-top: 1px solid #222;
        }

        .dynamic-text {
            font-family: monospace;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            transition: opacity 0.4s ease, transform 0.4s ease;
            padding: 0 20px;
            text-align: center;
        }

        /* Botón Control */
        #wnDataToggle {
            position: fixed;
            top: 20px; right: 20px; z-index: 1100;
            background: #111; color: #fff;
            padding: 8px 14px; border: 1px solid #444;
            font-size: 10px; letter-spacing: 1px; cursor: pointer;
        }

        body.data-mode #wnDataToggle { background: var(--accent-red); border-color: transparent; }

        /* Animaciones */
        .batch { opacity: 0; transform: translateY(20px); transition: 1s; }
        .batch.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>

<body>

<button id="wnDataToggle">VIEW DATA</button>
<div id="app"></div>

<section class="wn-concept">
    <p class="dynamic-text" id="narrative-log">Iniciando sistema...</p>
</section>

<script>
const CONFIG = {
    TOTAL_IMAGES: 28,
    BATCH_SIZE: 6,
    IMG_PATH: 'manifest/' // Asegúrate de que esta carpeta exista
};

const app = document.getElementById("app");
const log = document.getElementById("narrative-log");

// 1. GENERAR GALERÍA
function init() {
    const fragment = document.createDocumentFragment();
    for (let i = 1; i <= CONFIG.TOTAL_IMAGES; i++) {
        if ((i - 1) % CONFIG.BATCH_SIZE === 0) {
            const gallery = document.createElement("div");
            gallery.className = "gallery batch";
            fragment.appendChild(gallery);
        }
        const id = String(i).padStart(2, '0');
        const photo = document.createElement("div");
        photo.className = "wn-photo";
        photo.dataset.id = `img_${id}`;
        photo.innerHTML = `
            <img src="${CONFIG.IMG_PATH}${id}.webp" loading="lazy" onerror="this.style.opacity='0.2'">
            <div class="wn-overlay">
                <span class="wn-time">0s</span>
                <span class="wn-label">--</span>
            </div>
        `;
        fragment.lastElementChild.appendChild(photo);
    }
    app.appendChild(fragment);
    app.style.paddingBottom = "100px"; // Espacio para no tapar última foto
}

// 2. NARRATIVA POR SCROLL
const updateScrollNarrative = () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrollPercent = scrollTop / docHeight;

    let message = "";
    if (scrollPercent < 0.1) message = "Esperando interacción...";
    else if (scrollPercent < 0.3) message = "Analizando fijación ocular primaria";
    else if (scrollPercent < 0.6) message = "Procesando fragmentos de ruido visual";
    else if (scrollPercent < 0.9) message = "Patrones de atención detectados";
    else message = "Análisis finalizado. Pulse 'View Data'";

    const finalMsg = `[SCN_${Math.round(scrollPercent * 100)}%] ${message}`;
    
    if (log.innerText !== finalMsg) {
        log.style.opacity = 0;
        setTimeout(() => {
            log.innerText = finalMsg;
            log.style.opacity = 1;
        }, 200);
    }
};

// 3. TRACKING DE TIEMPO
function setupTracking() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.classList.add("visible");
                e.target.dataset.start = Date.now();
            } else if (e.target.dataset.start) {
                saveTime(e.target);
            }
        });
    }, { threshold: 0.2 });

    document.querySelectorAll('.wn-photo, .batch').forEach(el => observer.observe(el));
}

function saveTime(el) {
    const time = Math.floor((Date.now() - el.dataset.start) / 1000);
    delete el.dataset.start;
    if (time < 1) return;

    let data = JSON.parse(localStorage.getItem('wn-data') || "{}");
    if (!data[el.dataset.id]) data[el.dataset.id] = { v: 0, t: 0 };
    data[el.dataset.id].v++;
    data[el.dataset.id].t += time;
    localStorage.setItem('wn-data', JSON.stringify(data));
}

// 4. DATA MODE
document.getElementById("wnDataToggle").onclick = () => {
    const isData = document.body.classList.toggle("data-mode");
    document.getElementById("wnDataToggle").innerText = isData ? "VIEW ART" : "VIEW DATA";
    if (isData) renderData();
};

function renderData() {
    const data = JSON.parse(localStorage.getItem('wn-data') || "{}");
    document.querySelectorAll('.wn-photo').forEach(el => {
        const item = data[el.dataset.id];
        if (!item) return;
        const avg = Math.round(item.t / item.v);
        el.querySelector('.wn-time').innerText = `${avg}s AVG`;
        
        el.classList.remove("wn-hot-high", "wn-hot-mid", "wn-hot-low");
        if (avg > 5) el.classList.add("wn-hot-high");
        else if (avg > 2) el.classList.add("wn-hot-mid");
        else el.classList.add("wn-hot-low");
    });
}

// INIT
window.onload = () => {
    init();
    setupTracking();
    window.addEventListener('scroll', updateScrollNarrative);
};
</script>

</body>
</html>
