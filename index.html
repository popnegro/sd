<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHISPERING NOISE | SONIC INTERCEPT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-red: #ff0000; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #app { padding: 80px 5% 150px 5%; max-width: 1100px; margin: 0 auto; min-height: 100vh; }

        /* --- HERO & UI --- */
        section.hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .hero h1 { font-size: clamp(2rem, 8vw, 4rem); color: var(--accent-red); font-weight: 900; margin-bottom: 10px; }
        .cta { border: 1px solid var(--accent-red); padding: 15px 30px; cursor: pointer; color: var(--accent-red); font-family: monospace; font-size: 12px; margin-top: 30px; transition: 0.3s; }
        .cta:hover { background: var(--accent-red); color: #000; }

        /* --- GALLERY --- */
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-bottom: 40px; }
        .batch { opacity: 0; transform: translateY(30px); transition: 1s; }
        .batch.visible { opacity: 1; transform: translateY(0); }
        .wn-photo { aspect-ratio: 1/1; background: #0a0a0a; overflow: hidden; position: relative; }
        .wn-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.8s; }
        .wn-photo img.loaded { opacity: 1; }
        .bio-asset-box { border: 1px solid var(--accent-red); }

        /* --- UI ELEMENTS --- */
        .ui-controls { position: fixed; top: 25px; right: 25px; z-index: 2000; }
        .btn-ui { background: rgba(15, 15, 15, 0.8); border: 1px solid #333; color: #fff; padding: 10px 16px; font-size: 9px; text-transform: uppercase; font-family: monospace; }
        #identity-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .card-id { border: 1px solid #222; padding: 40px; max-width: 400px; font-family: monospace; background: #0a0a0a; border-top: 4px solid var(--accent-red); }
        
        .wn-footer { position: fixed; bottom: 0; width: 100%; height: 60px; background: #050505; border-top: 1px solid #222; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #scroll-progress { position: absolute; top: 0; left: 0; height: 1px; background: var(--accent-red); width: 0%; }
        #status-log { font-family: monospace; font-size: 10px; color: #555; text-transform: uppercase; }
        #wn-stream { display: none; }
    </style>
</head>
<body>

    <video id="wn-stream" autoplay playsinline></video>

    <div class="ui-controls">
        <button id="btnIdentity" class="btn-ui" style="display:none; border-color:var(--accent-red); color:var(--accent-red);">Diagnóstico_Final</button>
    </div>

    <div id="identity-modal">
        <div class="card-id">
            <div id="modal-bio-display" style="width:100%; height:150px; background:#111; margin-bottom:20px; overflow:hidden;"></div>
            <div id="id-content" style="font-size: 11px; color: #aaa; line-height: 2;"></div>
            <button onclick="location.reload()" class="btn-ui" style="width:100%; margin-top:20px;">Terminar_Proceso</button>
        </div>
    </div>

    <section class="hero">
        <h1>WHISPERING_NOISE</h1>
        <p style="font-family: monospace; font-size: 10px; color: #444; letter-spacing: 2px;">AUDIO_INTERCEPT_MODULE // ON</p>
        <div class="cta" onclick="activateSystem('CLICK')">INICIAR_PROTOCOLO</div>
    </section>

    <div id="app"></div>

    <footer class="wn-footer">
        <div id="scroll-progress"></div>
        <p id="status-log">ESPERANDO_SINC...</p>
    </footer>

    <script>
        const CONFIG = { TOTAL_IMAGES: 28, BATCH_SIZE: 4, IMG_PATH: 'manifest/' };
        let audioCtx, micStream, gainNode, systemActivated = false, photoCaptured = false;

        // --- LÓGICA DE AUDIO ---
        async function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                const source = audioCtx.createMediaStreamSource(stream);
                gainNode = audioCtx.createGain();
                
                // Filtro para dar textura de "intercepción"
                const filter = audioCtx.createBiquadFilter();
                filter.type = "bandpass";
                filter.frequency.value = 1000;
                filter.Q.value = 1;

                source.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                gainNode.gain.value = 0.5; // Volumen inicial
                statusLog.innerText = "[AUDIO_SENSOR]: CAPTURANDO_AMBIENTE";
            } catch (e) {
                statusLog.innerText = "[ERROR]: MIC_BLOQUEADO";
            }
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('wn-stream').srcObject = stream;
            } catch (e) { console.warn("Cámara bloqueada"); }
        }

        async function activateSystem(source) {
            if (systemActivated) return;
            systemActivated = true;
            await initAudio();
            await initCamera();
            if (source === 'CLICK') window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
        }

        // --- LÓGICA DE GALERÍA Y SCROLL ---
        function initGallery() {
            const frag = document.createDocumentFragment();
            for (let i = 1; i <= CONFIG.TOTAL_IMAGES; i++) {
                if ((i-1) % CONFIG.BATCH_SIZE === 0) {
                    const gallery = document.createElement("div");
                    gallery.className = "gallery batch";
                    frag.appendChild(gallery);
                }
                const box = document.createElement("div");
                box.className = "wn-photo";
                const img = new Image();
                img.onload = () => img.classList.add('loaded');
                img.src = `${CONFIG.IMG_PATH}${String(i).padStart(2, '0')}.webp`;
                box.appendChild(img);
                frag.lastElementChild.appendChild(box);
            }
            document.getElementById("app").appendChild(frag);
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.batch').forEach(b => observer.observe(b));
        }

        window.addEventListener('scroll', () => {
            if (window.scrollY > 20 && !systemActivated) activateSystem('SCROLL');

            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = window.scrollY / (docHeight || 1);
            
            document.getElementById('scroll-progress').style.width = `${scrollPercent * 100}%`;

            // --- FADE OUT DEL AUDIO ---
            if (gainNode) {
                // A medida que scrollPercent va de 0 a 1, el volumen va de 0.5 a 0
                const vol = Math.max(0, 0.5 * (1 - scrollPercent));
                gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
            }

            // Captura de imagen al 50%
            if (scrollPercent > 0.5 && !photoCaptured) {
                const video = document.getElementById('wn-stream');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const data = canvas.toDataURL('image/webp');
                localStorage.setItem('wn-bio', data);
                
                // Inyectar en galería
                const galleries = document.querySelectorAll('.gallery');
                if(galleries[1]) {
                    const bioBox = document.createElement('div');
                    bioBox.className = "wn-photo bio-asset-box";
                    bioBox.innerHTML = `<img src="${data}" class="loaded">`;
                    galleries[1].prepend(bioBox);
                }
                photoCaptured = true;
            }

            if (scrollPercent > 0.9) document.getElementById('btnIdentity').style.display = 'block';
        });

        const statusLog = document.getElementById("status-log");
        document.getElementById('btnIdentity').onclick = () => {
            const bio = localStorage.getItem('wn-bio');
            if(bio) document.getElementById('modal-bio-display').innerHTML = `<img src="${bio}" style="width:100%; height:100%; object-fit:cover;">`;
            document.getElementById('id-content').innerHTML = `ID_BIO_RHYTHM: DETECTED<br>AUDIO_LOG: TERMINATED_BY_DISTANCE<br>STATUS: ARCHIVED`;
            document.getElementById('identity-modal').style.display = 'flex';
        };

        window.onload = initGallery;
    </script>
</body>
</html>
