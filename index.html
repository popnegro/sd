<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SIGNAL | MORPHEUS RGB ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* BASE & RESET */
        body, html { 
            background-color: #000; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        :root { 
            --kick: 0; 
            --morpheus-intensity: 80px; 
        }

        .viewport-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px; /* Profundidad global */
        }

        /* CRT CONTAINER CON ZOOM DE IMPACTO */
        .crt-container {
            position: relative;
            background: #000000;
            transition: transform 0.05s ease-out;
            /* El contenedor escala levemente con el bajo */
            transform: scale(calc(1 + var(--kick) * 0.05));
            will-change: transform;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        /* CAPAS DE GLITCH CON PROFUNDIDAD 3D */
        .glitch-layer {
            position: absolute;
            inset: -15%; /* Margen extra para que el zoom no muestre bordes vacíos */
            background-size: cover;
            background-position: center;
            mix-blend-mode: screen;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Capa Roja: Se proyecta hacia adelante (Zoom In) */
        .layer-red {
            background-color: #f00;
            background-blend-mode: multiply;
            transform: translate3d(calc(var(--kick) * var(--morpheus-intensity) * -1.2), 0, calc(var(--kick) * 250px)) 
                       scale(calc(1 + var(--kick) * 0.6));
            z-index: 3;
        }

        /* Capa Verde: Movimiento vertical y profundidad media */
        .layer-green {
            background-color: #0f0;
            background-blend-mode: multiply;
            transform: translate3d(0, calc(var(--kick) * 20px), calc(var(--kick) * 100px))
                       scale(calc(1 + var(--kick) * 0.3));
            opacity: 0.7;
            z-index: 2;
        }

        /* Capa Azul: Se aleja hacia el fondo */
        .layer-blue {
            background-color: #00f;
            background-blend-mode: multiply;
            transform: translate3d(calc(var(--kick) * var(--morpheus-intensity) * 1.2), 0, calc(var(--kick) * -150px))
                       scale(calc(1 + var(--kick) * 0.2));
            z-index: 1;
        }

        /* IMAGEN BASE & SLIDES */
        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.1s steps(2); /* Cambio tipo glitch */
            filter: grayscale(1) contrast(1.4) brightness(0.8);
        }

        /* SCANLINES (EFECTO CRT) */
        .scanlines::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 50%);
            background-size: 100% 3px;
            z-index: 40;
            pointer-events: none;
            opacity: 0.5;
        }

        /* UI ELEMENTS */
        .ui-overlay {
            position: absolute;
            z-index: 100;
            bottom: 10%;
            left: 5%;
            pointer-events: none;
        }

        .main-title {
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            line-height: 0.8;
        }

        #start-engine {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        #carousel {
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

    <audio id="bg-track" src="assets/sounds/mixkit-cinematic-transition-swoosh-heartbeat-trailer-488.wav" loop crossorigin="anonymous"></audio>
 
    <div class="viewport-wrapper">
        
        <div class="ui-overlay">
            <div id="header-group" class="transition-opacity duration-1000">
                <button id="start-engine" class="px-8 py-4 border border-white/50 text-white text-[11px] tracking-[0.5em] uppercase hover:bg-black hover:text-white transition-all duration-500 font-bold">
                    Iniciar secuencia
                </button>
            </div>
            
            <div class="mt-12">
                <h1 class="main-title text-[11vw] md:text-[8vw] tracking-[0.05em] opacity-50">
                    WHISPERING <br>NOISE
                </h1>
                <div class="w-[200px] h-[2px] bg-white/10 mt-5 overflow-hidden">
                    <div id="loading-bar" class="h-full bg-red-600 w-0 shadow-[0_0_15px_#f00] transition-all duration-75"></div>
                </div>
                <p class="text-[11px] text-white/50 tracking-[0.3em] mt-4 uppercase font-bold italic">STATUS: 15 04 2026</p>
            </div>
        </div>

        <figure class="crt-container scanlines">
            <div id="carousel" class="absolute inset-0 w-full h-full opacity-0">
                <img src="assets/img/eyes.webp" class="slide opacity-100" alt="1">
                <img src="assets/img/cross.webp" class="slide opacity-0" alt="3">
                <img src="assets/img/city.webp" class="slide opacity-0" alt="4">
                <img src="assets/img/fire.webp" class="slide opacity-0" alt="4">
                <img src="assets/img/red.webp" class="slide opacity-0" alt="3">
                <img src="assets/img/people.webp" class="slide opacity-0" alt="3">
                <img src="assets/img/sleep.webp" class="slide opacity-0" alt="3">
            </div>

            <div id="layer-r" class="glitch-layer layer-red"></div>
            <div id="layer-g" class="glitch-layer layer-green"></div>
            <div id="layer-b" class="glitch-layer layer-blue"></div>

            <div class="absolute inset-0 bg-[radial-gradient(circle,transparent_30%,black_150%)] z-20 pointer-events-none"></div>
        </figure>

    </div>

    <script>
        (function() {
            const CONFIG = {
                threshold: 210,     
                rotationWait: 400,  
                intensityMult: 1.5  
            };

            const state = {
                isRunning: false,
                currentIndex: 0,
                lastRotation: 0
            };

            const dom = {
                btn: document.getElementById('start-engine'),
                audio: document.getElementById('bg-track'),
                slides: document.querySelectorAll('.slide'),
                carousel: document.getElementById('carousel'),
                layers: [
                    document.getElementById('layer-r'),
                    document.getElementById('layer-g'),
                    document.getElementById('layer-b')
                ],
                root: document.documentElement,
                bar: document.getElementById('loading-bar'),
                header: document.getElementById('header-group')
            };

            let audioCtx, analyser, dataArray;

            function updateLayerImages() {
                const currentImg = dom.slides[state.currentIndex].src;
                dom.layers.forEach(layer => {
                    layer.style.backgroundImage = `url('${currentImg}')`;
                });
            }

            function rotateContent() {
                const now = Date.now();
                if (now - state.lastRotation < CONFIG.rotationWait) return;

                dom.slides[state.currentIndex].classList.replace('opacity-100', 'opacity-0');
                state.currentIndex = (state.currentIndex + 1) % dom.slides.length;
                dom.slides[state.currentIndex].classList.replace('opacity-0', 'opacity-100');
                
                updateLayerImages();
                state.lastRotation = now;
            }

            function engineLoop() {
                if (!state.isRunning) return;
                requestAnimationFrame(engineLoop);

                analyser.getByteFrequencyData(dataArray);

                // Promedio de frecuencias bajas para la intensidad física
                const bassValue = (dataArray[1] + dataArray[2] + dataArray[3]) / 3; 
                
                // Cálculo exponencial para que el zoom sea reactivo
                const intensity = Math.pow(bassValue / 255, 2.2) * CONFIG.intensityMult;

                dom.root.style.setProperty('--kick', intensity.toFixed(4));
                dom.bar.style.width = `${(bassValue / 255) * 100}%`;

                if (bassValue > CONFIG.threshold) {
                    rotateContent();
                }
            }

            async function start() {
                if (state.isRunning) return;

                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 64; 
                    
                    const source = audioCtx.createMediaElementSource(dom.audio);
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);

                    dataArray = new Uint8Array(analyser.frequencyBinCount);

                    await dom.audio.play();
                    state.isRunning = true;
                    
                    // MOSTRAR CAROUSEL CON TRANSICIÓN
                    dom.carousel.classList.replace('opacity-0', 'opacity-100');
                    dom.header.style.opacity = '0';
                    setTimeout(() => dom.header.style.display = 'none', 1000);

                    updateLayerImages();
                    engineLoop();
                } catch (e) {
                    console.error("Engine failure:", e);
                }
            }

            dom.btn.addEventListener('click', () => {
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                start();
            });
        })();
    </script>
</body>
</html>
