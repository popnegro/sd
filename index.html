<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Grasso | Visual Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #ebff00;
            --gray: #1a1a1a;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.2;
            -webkit-font-smoothing: antialiased; /* Suavizado de fuentes para WebP */
        }

        /* --- Cursor --- */
        #cursor {
            position: fixed;
            top: 0; left: 0;
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: difference;
            transform-origin: center center;
            transition: width 0.5s var(--ease), height 0.5s var(--ease), background-color 0.3s;
            will-change: transform;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 5% 8%;
        }

        .main-title {
            font-size: clamp(3.5rem, 12vw, 12rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.06em;
            line-height: 0.8;
        }

        /* --- Gallery --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 4rem 2rem;
            padding: 10vh 8%;
        }

        .project-item {
            grid-column: span 12;
            margin-bottom: 10vh;
        }

        @media (min-width: 768px) {
            .project-item { grid-column: span 6; }
            .project-item:nth-child(even) { margin-top: 25vh; }
        }

        /* Contenedor de imagen optimizado */
        .media-wrapper {
            position: relative;
            width: 100%;
            background: var(--gray);
            overflow: hidden;
            clip-path: inset(100% 0 0 0);
            transition: clip-path 1.6s var(--ease);
        }

        .media-wrapper.revealed { clip-path: inset(0% 0 0 0); }

        .media-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            filter: grayscale(1) contrast(1.1);
            transform: scale(1.3);
            transition: transform 2.5s var(--ease), filter 1.5s ease, opacity 0.8s ease;
            image-rendering: -webkit-optimize-contrast; /* Mejora nitidez WebP */
        }

        .media-wrapper img.loaded { opacity: 1; }

        .project-item:hover img {
            transform: scale(1.1);
            filter: grayscale(0) contrast(1);
        }

        .project-info { margin-top: 1.5rem; }

        .project-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            opacity: 0.4;
            margin-bottom: 0.5rem;
        }

        .project-title { font-size: clamp(1.2rem, 2vw, 2rem); font-weight: 400; }

        footer { padding: 10vh 8% 5vh; border-top: 1px solid var(--gray); font-size: 0.7rem; opacity: 0.3; }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <header>
        <h1 class="main-title">SELECTED<br>WORKS_</h1>
    </header>

    <main id="gallery-root" class="gallery"></main>

    <footer>
        <p>© 2026 LUIS GRASSO — MENDOZA, ARGENTINA</p>
    </footer>

    <script>
        // DATA: Asegúrate de que las extensiones .webp sean correctas en tu carpeta img/
        const PROJECTS = [
            { title: "Arquitectura Brutalista", img: "img/incendio.webp", loc: "Mendoza", year: "2024", ratio: "4/5" },
            { title: "Sombras Urbanas", img: "img/incendio.webp", loc: "Buenos Aires", year: "2023", ratio: "1/1" },
            { title: "Minimalismo", img: "img/incendio.webp", loc: "San Rafael", year: "2024", ratio: "3/4" }
        ];

        // Backup SVG optimizado para carga instantánea
        const placeholderSVG = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAwIiBoZWlnaHQ9IjEwMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzE1MTUxNSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmaWxsPSIjZWJmZjAwIiBmb250LWZhbWlseT0iSW50ZXIsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjAiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkltYWdlIE5vdCBGb3VuZDwvdGV4dD48L3N2Zz4=";

        function initGallery() {
            const container = document.getElementById('gallery-root');
            
            PROJECTS.forEach((p, i) => {
                const item = document.createElement('section');
                item.className = 'project-item';
                
                // Usamos la etiqueta <picture> para máxima compatibilidad con WebP
                item.innerHTML = `
                    <div class="media-wrapper" style="aspect-ratio: ${p.ratio}">
                        <img src="${p.img}" 
                             alt="${p.title}" 
                             onload="handleImageLoad(this)"
                             onerror="handleImageError(this)">
                    </div>
                    <div class="project-info">
                        <div class="project-meta">
                            <span>${p.loc}</span>
                            <span>${String(i + 1).padStart(2, '0')} — ${p.year}</span>
                        </div>
                        <h2 class="project-title">${p.title}</h2>
                    </div>
                `;
                container.appendChild(item);
            });

            revealOnScroll();
        }

        // Manejo de carga exitosa
        function handleImageLoad(image) {
            image.classList.add('loaded');
        }

        // Manejo de errores (Rutas incorrectas o formato no soportado)
        function handleImageError(image) {
            if (!image.dataset.error) {
                image.dataset.error = "true";
                image.src = placeholderSVG;
                image.classList.add('loaded');
                image.style.filter = "none"; 
                console.warn("Fallo al cargar recurso WebP:", image.getAttribute('src'));
            }
        }

        function revealOnScroll() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.media-wrapper').forEach(el => observer.observe(el));
        }

        // Cursor Engine con LERP
        const cursor = document.getElementById('cursor');
        let m = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let p = { x: window.innerWidth/2, y: window.innerHeight/2 };

        window.addEventListener('mousemove', e => { m.x = e.clientX; m.y = e.clientY; });

        function updateCursor() {
            p.x += (m.x - p.x) * 0.15;
            p.y += (m.y - p.y) * 0.15;
            cursor.style.transform = `translate3d(${p.x}px, ${p.y}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(updateCursor);
        }

        document.addEventListener('mouseover', e => {
            if (e.target.closest('.project-item')) {
                cursor.style.width = '60px'; 
                cursor.style.height = '60px';
                cursor.style.backgroundColor = 'rgba(235, 255, 0, 0.15)';
            }
        });

        document.addEventListener('mouseout', e => {
            if (e.target.closest('.project-item')) {
                cursor.style.width = '12px'; 
                cursor.style.height = '12px';
                cursor.style.backgroundColor = 'var(--accent)';
            }
        });

        window.onload = () => { 
            initGallery(); 
            updateCursor(); 
        };
    </script>
</body>
</html>
