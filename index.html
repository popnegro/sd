<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHISPERING NOISE | SCRUBBING REVEAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-red: #ff0000; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        #app { position: relative; z-index: 10; padding: 40px 5% 300px 5%; max-width: 1100px; margin: 0 auto; min-height: 100vh; }

        /* --- HERO & MANIFEST --- */
        section.hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; position: relative; z-index: 20; }
        .hero h1 { font-size: clamp(2.5rem, 10vw, 5rem); letter-spacing: -3px; color: var(--accent-red); font-weight: 900; }
        .cta { border: 1px solid var(--accent-red); padding: 15px 35px; cursor: pointer; color: var(--accent-red); margin-top: 30px; font-family: monospace; font-size: 13px; transition: 0.3s; }
        .cta:hover { background: var(--accent-red); color: #000; }

        .manifest-container { padding: 120px 20px; max-width: 900px; margin: 0 auto; text-align: center; position: relative; z-index: 20; }
        #manifest-paragraph { font-size: 1.3rem; line-height: 1.8; color: #1a1a1a; }
        @media (min-width: 768px) { #manifest-paragraph { font-size: 1.6rem; } }
        .word { display: inline-block; margin-right: 10px; transition: color 0.8s; }
        .word.revealed { color: #fff; }

        /* --- GALLERY GRID (1 COL MOBILE) --- */
        .batch { opacity: 0; transform: translateY(50px); transition: 1.2s; margin-top: 60px; }
        .batch.visible { opacity: 1; transform: translateY(0); }
        .gallery { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .gallery { grid-template-columns: repeat(2, 1fr); gap: 40px; } }

        .wn-photo { background: #0a0a0a; aspect-ratio: 1 / 1; overflow: hidden; border: 1px solid #111; }
        .wn-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 1s; }
        .wn-photo img.loaded { opacity: 1; }

        /* --- BOTTOM MONITORING PANEL --- */
        #bottom-system-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 25vh;
            z-index: 2000; display: none; pointer-events: none;
            background: #000; border-top: 1px solid rgba(255,0,0,0.3);
        }
        #gradual-bio-img { width: 100%; height: 100%; object-fit: cover; filter: blur(30px); opacity: 0; position: absolute; inset: 0; }
        
        /* Overlay de métricas alineadas */
        #social-hud-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 15px 25px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: flex-end; align-items: center; gap: 25px;
            z-index: 2001; opacity: 0; transition: opacity 0.5s;
        }
        .hud-metric { display: flex; align-items: center; gap: 8px; font-family: monospace; }
        .likes-count { color: #fff; font-size: 18px; font-weight: 900; }
        .hates-count { color: var(--accent-red); font-size: 18px; font-weight: 900; }

        /* --- UI & MODAL --- */
        .ui-controls { position: fixed; top: 25px; right: 25px; z-index: 3000; }
        .btn-ui { background: rgba(10, 10, 10, 0.9); border: 1px solid #333; color: #fff; padding: 10px 18px; font-size: 9px; font-family: monospace; cursor: pointer; text-transform: uppercase; }
        #identity-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 4000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .card-id { border: 1px solid #222; padding: 40px; max-width: 420px; font-family: monospace; border-top: 4px solid var(--accent-red); background: #080808; margin: 20px; }
        
        #wn-stream { display: none; }
    </style>
</head>
<body>

    <video id="wn-stream" autoplay playsinline></video>

    <div id="bottom-system-panel">
        <img id="gradual-bio-img" src="">
        
        <div id="social-hud-overlay">
            <div class="hud-metric">
                <span style="font-size: 14px;">❤️</span>
                <span id="likes-val" class="likes-count">0</span>
            </div>
            <div class="hud-metric">
                <span style="font-size: 14px;">👎</span>
                <span id="hates-val" class="hates-count">0</span>
            </div>
            <div style="font-size: 8px; color: #444; letter-spacing: 2px; border-left: 1px solid #222; padding-left: 15px;">LIVE_FEED_v2.6</div>
        </div>
    </div>

    <div class="ui-controls">
        <button id="btnIdentity" class="btn-ui" style="display:none; border-color: var(--accent-red); color: var(--accent-red);">Finalizar_Analisis</button>
    </div>

    <div id="identity-modal">
        <div class="card-id">
            <div id="modal-bio-display" style="width:100%; height:200px; background:#111; margin-bottom:20px; overflow:hidden; border:1px solid #333;"></div>
            <h2 style="color:var(--accent-red); margin-bottom: 10px; font-size: 14px; letter-spacing: 2px;">REPORTE_SOCIOMETRICO</h2>
            <div id="id-content" style="font-size: 10px; line-height: 2; color: #777;"></div>
            <button onclick="location.reload()" class="btn-ui" style="margin-top: 30px; width: 100%;">Borrar_Evidencia</button>
        </div>
    </div>

    <section class="hero">
        <h1>WHISPERING_NOISE</h1>
        <p style="font-family: monospace; font-size: 10px; color: #444; letter-spacing: 3px;">THRESHOLD_SCRUBBING_V2</p>
        <div class="cta" onclick="activateSystem('CLICK')">INICIAR_CAPTURA</div>
    </section>

    <div class="manifest-container">
        <p id="manifest-paragraph"></p>
    </div>

    <div id="app"></div>

    <script>
        const CONFIG = { TOTAL_IMAGES: 28, BATCH_SIZE: 4, IMG_PATH: 'manifest/' };
        const MANIFEST_TEXT = "La observación altera lo observado. El sistema registra no solo lo que ves, sino cómo lo ves. Cada fijación ocular es un bit de información. El ruido se convierte en señal cuando el observador se integra en el flujo de datos.";
        
        let audioCtx, gainNode, systemActivated = false, photoCaptured = false;

        async function activateSystem(source) {
            if (systemActivated) return;
            systemActivated = true;
            await initAudio();
            await initCamera();
            if (source === 'CLICK') document.querySelector('.manifest-container').scrollIntoView({ behavior: 'smooth' });
        }

        async function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                gainNode = audioCtx.createGain();
                source.connect(gainNode).connect(audioCtx.destination);
                gainNode.gain.value = 0.4;
            } catch (e) {}
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('wn-stream').srcObject = stream;
            } catch (e) {}
        }

        function capturePhoto() {
            if (photoCaptured) return;
            const video = document.getElementById('wn-stream');
            if(!video.videoWidth) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/webp');
            
            document.getElementById('gradual-bio-img').src = dataUrl;
            document.getElementById('bottom-system-panel').style.display = 'block';
            localStorage.setItem('wn-bio-asset', dataUrl);
            photoCaptured = true;
        }

        function init() {
            const manifestP = document.getElementById('manifest-paragraph');
            manifestP.innerHTML = MANIFEST_TEXT.split(" ").map(word => `<span class="word">${word}</span>`).join(" ");

            const frag = document.createDocumentFragment();
            for (let i = 1; i <= CONFIG.TOTAL_IMAGES; i++) {
                if ((i-1) % CONFIG.BATCH_SIZE === 0) {
                    const gallery = document.createElement("div");
                    gallery.className = "gallery batch";
                    frag.appendChild(gallery);
                }
                const box = document.createElement("div");
                box.className = "wn-photo";
                const img = new Image();
                img.onload = () => img.classList.add('loaded');
                img.src = `${CONFIG.IMG_PATH}${String(i).padStart(2, '0')}.webp`;
                box.appendChild(img);
                frag.lastElementChild.appendChild(box);
            }
            document.getElementById("app").appendChild(frag);
            setupTracking();
        }

        window.addEventListener('scroll', () => {
            if (window.scrollY > 20 && !systemActivated) activateSystem('SCROLL');

            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = window.scrollY / (docHeight || 1);

            // --- 30%: CAPTURA EN EL BOTTOM ---
            if (scrollPercent > 0.3 && !photoCaptured) capturePhoto();
            
            // --- 30% AL 50%: SCRUBBING REVEAL ---
            if (photoCaptured) {
                const revealStart = 0.3;
                const revealEnd = 0.5;
                let revealProg = (scrollPercent - revealStart) / (revealEnd - revealStart);
                revealProg = Math.min(Math.max(revealProg, 0), 1);

                const bioImg = document.getElementById('gradual-bio-img');
                bioImg.style.opacity = revealProg;
                bioImg.style.filter = `blur(${(1 - revealProg) * 30}px) grayscale(${1 - revealProg})`;
            }

            // --- 50% AL 80%: MÉTRICAS ALINEADAS ---
            const socialHud = document.getElementById('social-hud-overlay');
            if (scrollPercent > 0.5 && scrollPercent < 0.9) {
                socialHud.style.opacity = "1";
                const multiplier = Math.pow((scrollPercent - 0.5) * 10, 5); 
                document.getElementById('likes-val').innerText = Math.floor(multiplier * 2.5).toLocaleString();
                document.getElementById('hates-val').innerText = Math.floor(multiplier * 7.8).toLocaleString();
            } else if (scrollPercent >= 0.9) {
                socialHud.style.opacity = "1";
            } else {
                socialHud.style.opacity = "0";
            }

            if (scrollPercent > 0.96) document.getElementById('btnIdentity').style.display = 'block';
        });

        function setupTracking() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.target.classList.contains('word') && e.isIntersecting) e.target.classList.add('revealed');
                    if (e.target.classList.contains('batch') && e.isIntersecting) e.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.word, .batch').forEach(el => observer.observe(el));
        }

        document.getElementById('btnIdentity').onclick = () => {
            const bio = localStorage.getItem('wn-bio-asset');
            document.getElementById('modal-bio-display').innerHTML = `<img src="${bio}" style="width:100%; height:100%; object-fit:cover;">`;
            document.getElementById('id-content').innerHTML = `SISTEMA_REVELADO: BOTTOM_FEEDS<br>EXTRACCIÓN_COMPLETA<br>STATUS: ANALIZADO`;
            document.getElementById('identity-modal').style.display = 'flex';
        };

        window.onload = init;
    </script>
</body>
</html>
