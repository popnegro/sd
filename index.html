<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WHISPERING NOISE | DATA EXPERIENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-red: #ff0000; --accent-orange: #ff8800; }
        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; transition: filter 0.5s ease; -webkit-font-smoothing: antialiased; }
        .system-wipe { filter: brightness(3) contrast(2) grayscale(1) blur(15px); }
        @keyframes noise-placeholder { 0% { background-position: 0 0; } 100% { background-position: 100% 100%; } }
        .wn-photo { position: relative; background: #0a0a0a; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAElBMVEUAAAD8/Pz09PT4+Pj29vb////66V33AAAABnRSTlMA//////8A699dAAAACXBIWXMAAAsTAAALEwEAmpwYAAAARElEQVQ4y2NgQAX8DIxgpMAIphmYmZkhNAszKzMDCxAzMCGqYmZihmhmZESqYmZmxmRmZkamYmZmxmRmZsamYmZmxmQAAPLPC9690S8fAAAAAElFTkSuQmCC'); background-size: 150px; animation: noise-placeholder 0.3s steps(4) infinite; aspect-ratio: 1 / 1; overflow: hidden; will-change: transform; }
        .wn-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .wn-photo img.loaded { opacity: 1; }
        .wn-photo:hover img { transform: scale(1.05); }
        .wn-overlay { position: absolute; bottom: 0; width: 100%; padding: 12px; font-size: 10px; font-family: monospace; background: linear-gradient(transparent, rgba(0, 0, 0, 0.95)); display: flex; justify-content: space-between; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10; }
        .wn-photo:hover .wn-overlay, body.data-mode .wn-overlay { opacity: 1; }
        body.data-mode .wn-hot-high { outline: 4px solid var(--accent-red); outline-offset: -4px; }
        body.data-mode .wn-hot-mid { outline: 3px solid var(--accent-orange); outline-offset: -3px; }
        body.data-mode .wn-hot-low { opacity: 0.3; }
        .ui-controls { position: fixed; top: 20px; right: 20px; z-index: 1100; display: flex; gap: 8px; }
        .btn-ui { background: rgba(12, 12, 12, 0.9); color: #fff; padding: 10px; border: 1px solid #333; font-size: 10px; cursor: pointer; backdrop-filter: blur(10px); text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        #wnResetBtn, #wnDownloadBtn { display: none; }
        body.data-mode #wnResetBtn, body.data-mode #wnDownloadBtn { display: flex; }
        body.data-mode #wnDataToggle { background: var(--accent-red); border-color: transparent; }
        .wn-concept { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; z-index: 1000; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(25px); display: flex; align-items: center; justify-content: center; border-top: 1px solid #222; }
        #scroll-progress { position: absolute; top: 0; left: 0; height: 2px; background: var(--accent-red); width: 0%; transition: width 0.1s linear; box-shadow: 0 0 15px var(--accent-red); }
        .dynamic-text { font-family: monospace; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; padding: 0 40px; text-align: center; }
        .glitch-active { animation: glitch-anim 0.15s infinite; text-shadow: 1.5px 0 var(--accent-red), -1.5px 0 var(--accent-orange); }
        @keyframes glitch-anim { 0%, 100% { transform: translate(0); } 33% { transform: translate(-1px, 1px); } 66% { transform: translate(1px, -1px); } }
        .batch { opacity: 0; transform: translateY(30px); transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); }
        .batch.visible { opacity: 1; transform: translateY(0); }
        .ready-to-analyze { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>

<body>
    <div class="ui-controls">
        <button id="wnDownloadBtn" class="btn-ui" title="Export Report">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
        <button id="wnResetBtn" class="btn-ui">Reset</button>
        <button id="wnDataToggle" class="btn-ui">View Data</button>
    </div>

    <div id="app"></div>

    <section class="wn-concept">
        <div id="scroll-progress"></div>
        <p class="dynamic-text" id="narrative-log">Inicializando terminal de datos...</p>
    </section>

    <script>
        const CONFIG = { TOTAL_IMAGES: 28, BATCH_SIZE: 6, IMG_PATH: 'manifest/' };
        const app = document.getElementById("app");
        const log = document.getElementById("narrative-log");
        const dataToggle = document.getElementById("wnDataToggle");
        const progressBar = document.getElementById("scroll-progress");

        let audioCtx, filterNode;
        let isScrolling = false;

        function init() {
            const fragment = document.createDocumentFragment();
            for (let i = 1; i <= CONFIG.TOTAL_IMAGES; i++) {
                if ((i - 1) % CONFIG.BATCH_SIZE === 0) {
                    const gallery = document.createElement("div");
                    gallery.className = "gallery batch";
                    fragment.appendChild(gallery);
                }
                const id = String(i).padStart(2, '0'); // Importante para 01, 02...
                const photo = document.createElement("div");
                photo.className = "wn-photo";
                photo.dataset.id = `img_${id}`;

                const img = new Image();
                img.src = `${CONFIG.IMG_PATH}${id}.webp`;
                img.loading = "lazy";
                img.onload = () => img.classList.add('loaded');

                photo.innerHTML = `<div class="wn-overlay"><span class="wn-time">0s</span><span class="wn-intensity">--</span></div>`;
                photo.prepend(img);
                fragment.lastElementChild.appendChild(photo);
            }
            app.appendChild(fragment);
            app.style.paddingBottom = "200px";
        }

        const initAudio = () => {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < output.length; i++) output[i] = Math.random() * 2 - 1;
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.value = 400;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.01;
            noiseSource.connect(filterNode).connect(gain).connect(audioCtx.destination);
            noiseSource.start();
        };

        const analyzePreference = (data) => {
            let stats = { m: 0, n: 0 };
            Object.keys(data).forEach(id => {
                const type = parseInt(id.split('_')[1]) % 2 === 0 ? 'n' : 'm';
                stats[type] += data[id].t;
            });
            return stats.m > stats.n ? "Minimalismo" : "Entropía";
        };

        const updateScrollNarrative = () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = Math.max(0, Math.min(1, scrollTop / (docHeight || 1)));

            progressBar.style.width = `${scrollPercent * 100}%`;
            if (filterNode) filterNode.frequency.setTargetAtTime(400 + (scrollPercent * 1500), audioCtx.currentTime, 0.1);

            log.classList.add('glitch-active');
            setTimeout(() => log.classList.remove('glitch-active'), 80);

            const data = JSON.parse(localStorage.getItem('wn-data') || "{}");
            const values = Object.values(data);
            const totalT = values.reduce((a, b) => a + b.t, 0);
            const avg = values.length > 0 ? (totalT / values.reduce((a, b) => a + b.v, 0)) : 0;

            if (scrollPercent < 0.05) log.innerText = `[SCN_${Math.round(scrollPercent * 100)}%] Calibrando sensores...`;
            else if (scrollPercent < 0.95) {
                const steps = ["Escaneando...", "Procesando...", "Sincronizando...", "Interpretando..."];
                log.innerText = `[SCN_${Math.round(scrollPercent * 100)}%] ${steps[Math.floor(scrollPercent * steps.length)]}`;
            } else {
                log.innerText = `REPORTE: ${avg < 3 ? 'Escaneo Veloz' : 'Inmersión'} | ${analyzePreference(data)}`;
                dataToggle.classList.add("ready-to-analyze");
            }
        };

        window.addEventListener('scroll', () => {
            if (!isScrolling) {
                window.requestAnimationFrame(() => {
                    updateScrollNarrative();
                    isScrolling = false;
                });
                isScrolling = true;
            }
        });

        function setupTracking() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting && e.intersectionRatio > 0.2) {
                        e.target.classList.add("visible");
                        if (!e.target.dataset.start) e.target.dataset.start = Date.now();
                    } else if (e.target.dataset.start) {
                        saveTime(e.target);
                    }
                });
            }, { threshold: [0, 0.2, 1.0] });
            document.querySelectorAll('.wn-photo, .batch').forEach(el => observer.observe(el));
        }

        function saveTime(el) {
            const time = Math.floor((Date.now() - el.dataset.start) / 1000);
            delete el.dataset.start;
            if (time < 1 || !el.dataset.id) return;
            let data = JSON.parse(localStorage.getItem('wn-data') || "{}");
            if (!data[el.dataset.id]) data[el.dataset.id] = { v: 0, t: 0 };
            data[el.dataset.id].v++;
            data[el.dataset.id].t += time;
            localStorage.setItem('wn-data', JSON.stringify(data));
        }

        dataToggle.onclick = () => {
            const isD = document.body.classList.toggle("data-mode");
            dataToggle.innerText = isD ? "Art View" : "Data View";
            if (isD) renderData();
        };

        function renderData() {
            const data = JSON.parse(localStorage.getItem('wn-data') || "{}");
            const values = Object.values(data);
            if (values.length === 0) return;
            const maxT = Math.max(...values.map(v => v.t));
            document.querySelectorAll('.wn-photo').forEach(el => {
                const item = data[el.dataset.id];
                if (!item) return;
                const intensity = Math.round((item.t / maxT) * 100);
                el.querySelector('.wn-time').innerText = `${Math.round(item.t / item.v)}s AVG`;
                el.querySelector('.wn-intensity').innerText = `${intensity}% INT`;
                el.classList.remove("wn-hot-high", "wn-hot-mid", "wn-hot-low");
                if (intensity > 70) el.classList.add("wn-hot-high");
                else if (intensity > 30) el.classList.add("wn-hot-mid");
                else el.classList.add("wn-hot-low");
            });
        }

        document.getElementById("wnDownloadBtn").onclick = () => {
            const data = localStorage.getItem('wn-data');
            const blob = new Blob([JSON.stringify({ project: "WN", data: JSON.parse(data) }, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "wn_identity.json"; a.click();
        };

        document.getElementById("wnResetBtn").onclick = () => {
            if (confirm("¿WIPE MEMORY?")) {
                localStorage.removeItem('wn-data');
                document.body.classList.add("system-wipe");
                setTimeout(() => location.reload(), 600);
            }
        };

        document.addEventListener('mousedown', initAudio, { once: true });
        window.onload = () => { init(); setupTracking(); };
    </script>
</body>
</html>
