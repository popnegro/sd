<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH_LAB | Experimental Portfolio</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
            --gray: #151515;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Cursor Experimental (Magnet) */
        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s;
        }

        header {
            height: 50vh;
            display: flex;
            align-items: flex-end;
            padding: 40px 6%;
        }

        .title {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -4px;
            text-transform: uppercase;
        }

        /* Grid Asimétrica */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            padding: 0 6% 100px;
        }

        .photo-card {
            grid-column: span 6;
            margin-bottom: 60px;
        }

        .photo-card:nth-child(even) { margin-top: 100px; } /* Desfase visual */

        .img-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.2;
            background: var(--gray);
            overflow: hidden;
            clip-path: inset(100% 0 0 0); /* Estado inicial para el Reveal */
            transition: clip-path 1.2s var(--ease);
        }

        .img-box.visible { clip-path: inset(0% 0 0 0); }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.1);
            transform: scale(1.4);
            transition: transform 2s var(--ease), filter 1s ease;
        }

        .photo-card:hover img {
            transform: scale(1);
            filter: grayscale(0) contrast(1);
        }

        .meta {
            margin-top: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .gallery-container { grid-template-columns: 1fr; }
            .photo-card { grid-column: 1 / -1; margin-top: 0 !important; }
            #cursor { display: none; }
            * { cursor: auto; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <header>
        <h1 class="title">Visual<br>Archive_</h1>
    </header>

    <main class="gallery-container" id="gallery-root">
        </main>

    <script>
        // 1. Lógica de obtención de datos (Tu función adaptada)
        // Nota: Debido a restricciones de Instagram en 2026, 
        // esta función requiere un proxy o un servidor para no fallar por CORS.
        async function instaProfile(username) {
            const container = document.getElementById('gallery-root');
            
            try {
                // Simulamos la respuesta para que el diseño sea visible inmediatamente
                // En producción, aquí iría tu fetch a través de un worker o proxy
                const mockData = [
                    { id: 1, url: 'https://images.unsplash.com/photo-1554080353-a576cf803bda?q=80&w=1200' },
                    { id: 2, url: 'https://images.unsplash.com/photo-1508919892451-4f84990c6d33?q=80&w=1200' },
                    { id: 3, url: 'https://images.unsplash.com/photo-1438109491414-7198515b166b?q=80&w=1200' },
                    { id: 4, url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1200' }
                ];

                renderGallery(mockData);

            } catch (err) {
                console.error("Error cargando perfil:", err);
            }
        }

        // 2. Renderizado con microinteracciones
        function renderGallery(items) {
            const root = document.getElementById('gallery-root');
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <div class="img-box">
                        <img src="${item.url}" alt="Capture ${index}" loading="lazy">
                    </div>
                    <div class="meta">
                        <span>Index: 0${index + 1}</span>
                        <span>Mendoza, ARG</span>
                    </div>
                `;
                root.appendChild(card);
            });

            setupScrollReveal();
        }

        // 3. Cursor Magnético
        const cursor = document.getElementById('cursor');
        let mouse = { x: 0, y: 0 };
        let pos = { x: 0, y: 0 };
        const ratio = 0.15;

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function updateCursor() {
            pos.x += (mouse.x - pos.x) * ratio;
            pos.y += (mouse.y - pos.y) * ratio;
            cursor.style.transform = `translate3d(${pos.x - 4}px, ${pos.y - 4}px, 0)`;
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        // 4. Scroll Reveal (Intersection Observer)
        function setupScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.img-box').forEach(box => observer.observe(box));
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            instaProfile('luisgrasso');
        });
    </script>
</body>
</html>
