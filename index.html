<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Grasso | Visual Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #ebff00;
            --gray: #151515;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.2;
            -webkit-font-smoothing: antialiased;
        }

        #cursor {
            position: fixed;
            top: 0; left: 0;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: difference;
            transition: width 0.4s var(--ease), height 0.4s var(--ease), background-color 0.4s;
            will-change: transform;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 5% 8%;
        }

        .main-title {
            font-size: clamp(3rem, 15vw, 10rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            line-height: 0.85;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
            padding: 10vh 8%;
        }

        .project-item {
            grid-column: span 12;
            margin-bottom: 15vh;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        @media (min-width: 768px) {
            .project-item { grid-column: span 6; }
            .project-item:nth-child(even) { margin-top: 20vh; }
        }

        .media-container {
            position: relative;
            width: 100%;
            background: var(--gray);
            overflow: hidden;
            clip-path: inset(100% 0 0 0);
            transition: clip-path 1.4s var(--ease);
        }

        .media-container.visible { clip-path: inset(0% 0 0 0); }

        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.7);
            transform: scale(1.15);
            transition: transform 2s var(--ease), filter 1.2s ease;
        }

        .project-item:hover img {
            transform: scale(1.05);
            filter: grayscale(0) brightness(1);
        }

        .project-meta {
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.4;
        }

        .project-title {
            margin-top: 0.5rem;
            font-size: 1.5rem;
            font-weight: 400;
        }

        footer {
            padding: 10vh 8% 5vh;
            border-top: 1px solid var(--gray);
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <header>
        <h1 class="main-title">SELECTED<br>WORKS_</h1>
    </header>

    <main id="gallery-root" class="gallery">
        </main>

    <footer>
        <p>© 2026 Luis Grasso — Mendoza, Argentina.</p>
    </footer>

    <script>
        // DATOS LOCALES - Evitan el error de CORS / "Unsafe attempt"
        const DATA = [
            {
                "title": "Arquitectura Brutalista",
                "url": "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200",
                "location": "Mendoza",
                "date": "2024",
                "aspect": "4/5"
            },
            {
                "title": "Sombras Urbanas",
                "url": "https://images.unsplash.com/photo-1449156003053-93d3a62bf28f?q=80&w=1200",
                "location": "Buenos Aires",
                "date": "2023",
                "aspect": "1/1"
            },
            {
                "title": "Minimalismo Estructural",
                "url": "https://images.unsplash.com/photo-1518005020411-38b81210a7ab?q=80&w=1200",
                "location": "San Rafael",
                "date": "2024",
                "aspect": "3/4"
            }
        ];

        // 1. RENDER (Ejecución directa sin fetch)
        const root = document.getElementById('gallery-root');
        
        DATA.forEach((item, index) => {
            const article = document.createElement('a');
            article.href = "#";
            article.className = 'project-item';
            article.innerHTML = `
                <div class="media-container" style="aspect-ratio: ${item.aspect}">
                    <img src="${item.url}" alt="${item.title}">
                </div>
                <div class="project-meta">
                    <span>${item.location}</span>
                    <span>${String(index + 1).padStart(2, '0')} // ${item.date}</span>
                </div>
                <h2 class="project-title">${item.title}</h2>
            `;
            root.appendChild(article);
        });

        // 2. CURSOR ANIMADO (LERP)
        const cursor = document.getElementById('cursor');
        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let pos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        const lerp = 0.1;

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animate() {
            pos.x += (mouse.x - pos.x) * lerp;
            pos.y += (mouse.y - pos.y) * lerp;
            cursor.style.transform = `translate3d(${pos.x - (cursor.offsetWidth/2)}px, ${pos.y - (cursor.offsetHeight/2)}px, 0)`;
            requestAnimationFrame(animate);
        }
        animate();

        // 3. REVEAL AL SCROLL (Intersection Observer)
        const observerOptions = { threshold: 0.15 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.media-container').forEach(el => observer.observe(el));

        // 4. CURSOR HOVER EFFECTS
        document.body.addEventListener('mouseover', e => {
            if (e.target.closest('.project-item')) {
                cursor.style.width = '60px';
                cursor.style.height = '60px';
                cursor.style.backgroundColor = 'rgba(235, 255, 0, 0.2)';
                cursor.style.border = '1px solid var(--accent)';
            }
        });

        document.body.addEventListener('mouseout', e => {
            if (e.target.closest('.project-item')) {
                cursor.style.width = '10px';
                cursor.style.height = '10px';
                cursor.style.backgroundColor = 'var(--accent)';
                cursor.style.border = 'none';
            }
        });

    </script>
</body>
</html>
